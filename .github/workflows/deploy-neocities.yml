name: Deploy to Neocities

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: neocities-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out site
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Import current Neocities files when repo is empty
        env:
          NEOCITIES_API_KEY: ${{ secrets.NEOCITIES_API_KEY }}
        run: |
          set -euo pipefail

          if [ -f index.html ]; then
            echo "Repository already has site files."
            exit 0
          fi

          python3 - <<'PY'
          import json
          import os
          import sys
          import urllib.parse
          import urllib.request
          from pathlib import Path

          api_key = os.environ["NEOCITIES_API_KEY"]
          list_req = urllib.request.Request(
              "https://neocities.org/api/list",
              headers={"Authorization": f"Bearer {api_key}"},
          )

          with urllib.request.urlopen(list_req) as response:
              data = json.load(response)

          if data.get("result") != "success":
              print("Could not list Neocities files.", file=sys.stderr)
              print(data.get("error_type") or data.get("message") or data, file=sys.stderr)
              sys.exit(1)

          files = [
              item["path"]
              for item in data.get("files", [])
              if not item.get("is_directory")
          ]

          for name in sorted(files):
              url = "https://softstatic.neocities.org/" + urllib.parse.quote(name, safe="/")
              req = urllib.request.Request(url, headers={"User-Agent": "softstatic-github-import"})
              with urllib.request.urlopen(req) as response:
                  content = response.read()

              path = Path(name)
              path.parent.mkdir(parents=True, exist_ok=True)
              path.write_bytes(content)
              print(f"imported {name}")
          PY

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .

          if ! git diff --cached --quiet; then
            git commit -m "Import current softstatic site files"
            git push origin HEAD:main
          fi

      - name: Build deploy manifest
        run: |
          python3 - <<'PY'
          from pathlib import Path

          excluded_dirs = {".git", ".github"}
          excluded_files = {"SOFTSTATIC_RULES.md", "deploy-files.txt", "stale-files.txt"}

          files = []
          for path in Path(".").rglob("*"):
              if not path.is_file():
                  continue
              if any(part in excluded_dirs for part in path.parts):
                  continue
              if path.name in excluded_files or path.name == ".DS_Store":
                  continue
              files.append(path.as_posix())

          Path("deploy-files.txt").write_text(
              "\n".join(sorted(files)) + ("\n" if files else ""),
              encoding="utf-8",
          )
          PY
          sed 's/^/deploying /' deploy-files.txt

      - name: Upload files
        env:
          NEOCITIES_API_KEY: ${{ secrets.NEOCITIES_API_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${NEOCITIES_API_KEY:-}" ]; then
            echo "Missing NEOCITIES_API_KEY repository secret." >&2
            exit 1
          fi

          mapfile -t files < deploy-files.txt
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No deployable files found." >&2
            exit 1
          fi

          args=()
          for file in "${files[@]}"; do
            args+=("-F" "${file}=@${file}")
          done

          curl --fail --silent --show-error \
            -H "Authorization: Bearer ${NEOCITIES_API_KEY}" \
            "${args[@]}" \
            https://neocities.org/api/upload

      - name: Delete files removed from repo
        env:
          NEOCITIES_API_KEY: ${{ secrets.NEOCITIES_API_KEY }}
        run: |
          set -euo pipefail

          python3 - <<'PY'
          import json
          import os
          import sys
          import urllib.request
          from pathlib import Path

          req = urllib.request.Request(
              "https://neocities.org/api/list",
              headers={"Authorization": f"Bearer {os.environ['NEOCITIES_API_KEY']}"},
          )

          with urllib.request.urlopen(req) as response:
              data = json.load(response)

          if data.get("result") != "success":
              print("Could not list Neocities files.", file=sys.stderr)
              print(data.get("error_type") or data.get("message") or data, file=sys.stderr)
              sys.exit(1)

          remote = {
              item["path"]
              for item in data.get("files", [])
              if not item.get("is_directory")
          }
          local = set(Path("deploy-files.txt").read_text(encoding="utf-8").splitlines())
          stale = sorted(remote - local)

          Path("stale-files.txt").write_text(
              "\n".join(stale) + ("\n" if stale else ""),
              encoding="utf-8",
          )
          print(f"{len(stale)} stale file(s) to delete.")
          PY

          if [ -s stale-files.txt ]; then
            args=()
            while IFS= read -r file; do
              args+=("-F" "filenames[]=${file}")
            done < stale-files.txt

            curl --fail --silent --show-error \
              -H "Authorization: Bearer ${NEOCITIES_API_KEY}" \
              "${args[@]}" \
              https://neocities.org/api/delete
          fi
